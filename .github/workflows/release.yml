name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build:
    name: Build
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build TUI
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o bujotui-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/bujotui

      - name: Build MCP
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o bujotui-mcp-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/bujotui-mcp

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bujotui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bujotui-${{ matrix.goos }}-${{ matrix.goarch }}
            bujotui-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bujotui-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
